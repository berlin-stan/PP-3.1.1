<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; text-decoration: none; border: 1px solid #ccc; }
    </style>
</head>
<body>
<h1>Users List</h1>

<a th:href="@{/addUser}" class="btn">Add New User</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">ID</td>
        <td th:text="${user.name}">Name</td>
        <td th:text="${user.email}">Email</td>
        <td th:text="${user.age}">Age</td>
        <td>
            <a th:href="@{/editUser(id=${user.id})}" class="btn">Edit</a>
            <a th:href="@{/deleteUser(id=${user.id})}" class="btn"
               onclick="return confirm('Delete this user?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
